# Data (2s npy dataset)
data.source=npy
data.npy_root_path=./2s/2s
data.test_ratio=0.3
data.seed=42

# Preprocess (kept for compatibility)
preprocess.min_snr=0.0
preprocess.min_range=0.0
preprocess.max_range=20.0
preprocess.min_points_per_frame=1

# Cluster (kept for compatibility)
cluster.eps=0.3
cluster.min_pts=5

# Classifier
classifier.type=fgst
fgst.learning_rate=0.0012
fgst.epochs=50
fgst.batch_size=128
fgst.weight_decay=0.0001
fgst.max_frames=20
fgst.max_points_per_frame=80
fgst.num_body_parts=16
fgst.point_feature_dim=128
fgst.temporal_feature_dim=128
fgst.temporal_dilations=1,2,3,4
fgst.negative_slope=0.1
fgst.dropout=0.2

# Training enhancement
train.use_class_weight=false
train.use_triplet_loss=true
train.triplet_margin=0.2
train.triplet_weight=0.5
train.adam_beta1=0.9
train.adam_beta2=0.999
train.lr_decay_milestones=20,35
train.lr_decay_gamma=0.5
train.save_best_only=true

# Data augmentation
augment.enable=true
augment.jitter_std=0.005
augment.point_dropout=0.05
augment.time_shift=0

# Output (PyTorch)
model.path=./model/mmwave_fgst_2s_pytorch.pt
report.path=./model/metrics_fgst_2s_pytorch.csv
predict.output_path=./model/predict_result_2s_pytorch.csv
