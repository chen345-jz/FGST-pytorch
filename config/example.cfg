# Data
data.manifest_path=./data/manifest.csv
data.test_ratio=0.2
data.seed=42

# Preprocess
preprocess.min_snr=3.0
preprocess.min_range=0.2
preprocess.max_range=8.0
preprocess.min_points_per_frame=8

# Cluster
cluster.eps=0.3
cluster.min_pts=5

# Classifier
classifier.type=fgst
classifier.k_neighbors=3
softmax.learning_rate=0.05
softmax.epochs=200
softmax.l2=0.0001
fgst.learning_rate=0.001
fgst.epochs=50
fgst.batch_size=16
fgst.weight_decay=0.0001
fgst.max_frames=32
fgst.max_points_per_frame=64
fgst.num_body_parts=4
fgst.point_feature_dim=64
fgst.temporal_feature_dim=128

# Model
model.path=./model/mmwave_fgst.pt
report.path=./model/metrics_fgst.csv

