# Data (2s npy dataset)
data.source=npy
data.npy_root_path=./2s/2s
data.test_ratio=0.2
data.seed=42

# Preprocess
preprocess.min_snr=0.0
preprocess.min_range=0.0
preprocess.max_range=20.0
preprocess.min_points_per_frame=1

# Cluster
cluster.eps=0.3
cluster.min_pts=5

# Classifier
classifier.type=fgst
classifier.k_neighbors=3
softmax.learning_rate=0.05
softmax.epochs=200
softmax.l2=0.0001
fgst.learning_rate=0.001
fgst.epochs=50
fgst.batch_size=256
fgst.weight_decay=0.0001
fgst.max_frames=20
fgst.max_points_per_frame=80
fgst.num_body_parts=4
fgst.point_feature_dim=64
fgst.temporal_feature_dim=128

# Output
model.path=./model/mmwave_fgst_2s.pt
report.path=./model/metrics_fgst_2s.csv
predict.output_path=./model/predict_result_2s.csv
